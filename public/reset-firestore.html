<!DOCTYPE html><html><head><title>Reset Firestore</title><style>body{font-family:Arial;padding:40px;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh}.container{background:white;padding:40px;border-radius:20px;max-width:600px;margin:0 auto}h1{color:#333}button{padding:15px 30px;font-size:16px;border:none;border-radius:10px;cursor:pointer;margin:10px;font-weight:bold}.btn-danger{background:#ef4444;color:white}.btn-success{background:#10b981;color:white}button:hover{opacity:0.9}#log{margin-top:20px;padding:20px;background:#1f2937;color:#10b981;font-family:monospace;border-radius:10px;max-height:400px;overflow-y:auto}</style></head><body><div class="container"><h1>Reset Firestore</h1><p>Delete all collections and rebuild clean structure</p><button class="btn-danger" onclick="deleteAll()">Delete All Collections</button><button class="btn-success" onclick="rebuild()">Rebuild Everything</button><div id="log">Ready...</div></div><script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script><script>firebase.initializeApp({apiKey:"AIzaSyATdL0mgIrfRhfZ17jeAIHPcwFcX4_zspA",authDomain:"scan2reach-new.firebaseapp.com",projectId:"scan2reach-new",storageBucket:"scan2reach-new.firebasestorage.app",messagingSenderId:"466815844554",appId:"1:466815844554:web:caf16651ec18d026d8b433"});const auth=firebase.auth();const db=firebase.firestore();function log(m){document.getElementById('log').innerHTML+=m+'<br>'}async function del(c){log('Deleting '+c+'...');const s=await db.collection(c).get();if(s.empty){log('Empty');return}const b=db.batch();s.docs.forEach(d=>b.delete(d.ref));await b.commit();log('Done: '+s.size+' docs')}async function deleteAll(){if(!confirm('Delete all?'))return;log('Starting...');await del('users');await del('profiles');await del('payments');await del('products');await del('plans');await del('settings');await del('admin_logs');log('All deleted!')}async function rebuild(){const u=auth.currentUser;if(!u){alert('Login first');return}log('Rebuilding...');await db.collection('admins').doc(u.uid).set({uid:u.uid,email:u.email,name:u.email.split('@')[0],role:'super_admin',createdAt:firebase.firestore.FieldValue.serverTimestamp()});log('Admin OK');await db.collection('users').doc(u.uid).set({uid:u.uid,email:u.email,createdAt:firebase.firestore.FieldValue.serverTimestamp()});log('User OK');await db.collection('settings').doc('general').set({siteName:'Scan2Reach',currency:'INR'});await db.collection('settings').doc('pricing').set({vehicle:199,vehicle_elite:399,digital_card:299,business:499});await db.collection('settings').doc('plans').set({vehicle:{name:'Vehicle QR',price:199},digital_card:{name:'Digital Card',price:299}});log('Settings OK');log('Complete! Go to /admin.html');setTimeout(()=>location.href='/admin.html',2000)}</script></body></html>
