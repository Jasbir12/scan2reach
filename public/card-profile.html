<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Profile - Scan2Reach</title>
    <meta name="description" content="Digital professional profile powered by Scan2Reach">
    <meta name="theme-color" content="#3b82f6">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="profile">
    <meta property="og:title" content="Digital Business Card - Scan2Reach">
    <meta property="og:description" content="View my digital business card">
    <meta property="og:image" content="https://scan2reach.com/assets/og-card.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #8b5cf6;
            --success: #10b981;
            --success-dark: #059669;
            --warning: #f59e0b;
            --danger: #ef4444;
            --danger-dark: #991b1b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --whatsapp: #25D366;
            --whatsapp-dark: #20BA5A;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Animated background effects */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .profile-card {
            background: white;
            border-radius: var(--radius-xl);
            max-width: 480px;
            width: 100%;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: slideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ==================== Loading State ==================== */
        .loading {
            padding: 5rem 2rem;
            text-align: center;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--gray-500);
            font-weight: 600;
            font-size: 1rem;
        }

        .loading-subtext {
            color: var(--gray-400);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        /* ==================== Error State ==================== */
        .error {
            padding: 4rem 2rem;
            text-align: center;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }

        .error h2 {
            color: var(--danger-dark);
            margin-bottom: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .error p {
            color: var(--gray-500);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .error-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .hide {
            display: none !important;
        }

        /* ==================== Expired Banner ==================== */
        .expired-banner {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: var(--danger-dark);
            padding: 1.25rem 1.5rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
            display: none;
            border-bottom: 3px solid var(--danger);
        }

        .expired-banner.visible {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* ==================== Profile Header ==================== */
        .profile-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 2.5rem 2rem 2rem;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shimmer 6s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-30px, -30px) rotate(15deg); }
        }

        .profile-photo-wrapper {
            position: relative;
            z-index: 1;
            margin-bottom: 1.25rem;
        }

        .profile-photo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid white;
            margin: 0 auto;
            overflow: hidden;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            position: relative;
        }

        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .profile-photo:hover img {
            transform: scale(1.05);
        }

        .profile-photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--gray-100) 0%, var(--gray-200) 100%);
        }

        .verified-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: var(--success);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .profile-name {
            font-size: 1.875rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.15);
            position: relative;
            z-index: 1;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .profile-designation {
            font-size: 1.05rem;
            margin-bottom: 0.25rem;
            opacity: 0.95;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .profile-company {
            font-size: 0.95rem;
            opacity: 0.9;
            font-weight: 500;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
        }

        /* ==================== Quick Actions ==================== */
        .quick-actions {
            padding: 1.75rem 1.5rem;
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
        }

        .quick-actions-title {
            text-align: center;
            color: var(--gray-700);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .action-buttons.single-row {
            grid-template-columns: repeat(4, 1fr);
        }

        .action-buttons.three-items {
            grid-template-columns: repeat(3, 1fr);
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 1rem 0.75rem;
            border-radius: var(--radius);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .action-btn:hover::before {
            width: 180px;
            height: 180px;
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .action-btn-icon {
            font-size: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .action-btn-text {
            position: relative;
            z-index: 1;
            font-size: 0.8rem;
        }

        .btn-call {
            background: linear-gradient(135deg, var(--success) 0%, var(--success-dark) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
        }

        .btn-call:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.45);
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, var(--whatsapp) 0%, var(--whatsapp-dark) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.35);
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.45);
        }

        .btn-email {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
        }

        .btn-email:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.45);
        }

        .btn-save {
            background: linear-gradient(135deg, var(--gray-600) 0%, var(--gray-700) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(75, 85, 99, 0.35);
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(75, 85, 99, 0.45);
        }

        .btn-location {
            background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.35);
        }

        .btn-location:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.45);
        }

        /* ==================== Profile Details ==================== */
        .profile-details {
            padding: 1.75rem 1.5rem;
        }

        .details-section {
            margin-bottom: 1.75rem;
        }

        .details-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            color: var(--gray-800);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.75px;
            margin-bottom: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-icon {
            font-size: 1.1rem;
        }

        .detail-item {
            background: var(--gray-50);
            padding: 0.875rem 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 0.5rem;
            border: 1px solid var(--gray-200);
            transition: all 0.2s ease;
        }

        .detail-item:hover {
            border-color: var(--gray-300);
            background: var(--gray-100);
            transform: translateX(3px);
        }

        .detail-item:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            font-size: 0.7rem;
            color: var(--gray-500);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .detail-value {
            font-size: 0.95rem;
            color: var(--gray-800);
            font-weight: 600;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .detail-value a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .detail-value a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        /* ==================== Social Links ==================== */
        .social-links {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 0.75rem;
            background: white;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-sm);
            text-decoration: none;
            color: var(--gray-700);
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.25s ease;
        }

        .social-link:hover {
            border-color: var(--primary);
            background: #eff6ff;
            color: var(--primary);
            transform: translateY(-2px);
        }

        .social-icon {
            font-size: 1.15rem;
        }

        /* ==================== Bio Section ==================== */
        .bio-text {
            background: var(--gray-50);
            padding: 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--gray-200);
            font-size: 0.95rem;
            color: var(--gray-700);
            line-height: 1.6;
        }

        /* ==================== Footer ==================== */
        .profile-footer {
            background: var(--gray-50);
            padding: 1.5rem;
            text-align: center;
            border-top: 1px solid var(--gray-200);
        }

        .footer-brand {
            color: var(--gray-500);
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .footer-logo {
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .footer-logo:hover {
            color: var(--primary-dark);
        }

        /* ==================== Incomplete Profile ==================== */
        .incomplete-profile {
            padding: 3rem 2rem;
            text-align: center;
        }

        .incomplete-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .incomplete-title {
            color: var(--gray-700);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .incomplete-text {
            color: var(--gray-500);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* ==================== Mobile Responsive ==================== */
        @media (max-width: 640px) {
            body {
                padding: 12px;
                align-items: flex-start;
                padding-top: 20px;
            }

            .profile-card {
                border-radius: 20px;
                max-width: 100%;
            }

            .profile-header {
                padding: 2rem 1.5rem 1.75rem;
            }

            .profile-photo {
                width: 110px;
                height: 110px;
            }

            .profile-name {
                font-size: 1.5rem;
            }

            .profile-designation {
                font-size: 0.95rem;
            }

            .profile-company {
                font-size: 0.9rem;
            }

            .quick-actions,
            .profile-details,
            .profile-footer {
                padding: 1.25rem;
            }

            .action-buttons {
                grid-template-columns: repeat(2, 1fr);
            }

            .action-buttons.single-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .social-links {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 380px) {
            .profile-photo {
                width: 100px;
                height: 100px;
            }

            .profile-name {
                font-size: 1.35rem;
            }

            .action-btn {
                padding: 0.875rem 0.5rem;
            }

            .action-btn-icon {
                font-size: 1.35rem;
            }

            .action-btn-text {
                font-size: 0.75rem;
            }
        }

        /* ==================== Print Styles ==================== */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            .profile-card {
                box-shadow: none;
                max-width: 100%;
            }

            .action-buttons,
            .profile-footer {
                display: none;
            }
        }

        /* ==================== Animations ==================== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        /* ==================== Toast Notification ==================== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--gray-800);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: var(--shadow-xl);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }
    </style>
</head>
<body>
    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <div class="profile-card">
        <!-- Loading State -->
        <div id="loadingState" class="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading profile...</div>
            <div class="loading-subtext">Please wait a moment</div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="error hide">
            <span class="error-icon">😕</span>
            <h2>Profile Not Found</h2>
            <p id="errorMessage">This profile doesn't exist or has been removed.</p>
            <button class="error-btn" onclick="window.location.reload()">
                🔄 Try Again
            </button>
        </div>

        <!-- Expired Banner -->
        <div id="expiredBanner" class="expired-banner">
            <span>⚠️</span>
            <span>This profile has expired. Contact the owner for renewal.</span>
        </div>

        <!-- Profile Content -->
        <div id="profileContent" class="hide">
            <!-- Header -->
            <div class="profile-header">
                <div class="profile-photo-wrapper">
                    <div class="profile-photo" id="profilePhoto">
                        <div class="profile-photo-placeholder">👤</div>
                    </div>
                </div>
                <h1 class="profile-name" id="profileName">Loading...</h1>
                <div class="profile-designation" id="profileDesignation"></div>
                <div class="profile-company" id="profileCompany"></div>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions" id="quickActionsSection">
                <div class="quick-actions-title">Quick Contact</div>
                <div class="action-buttons" id="actionButtons">
                    <!-- Buttons will be inserted dynamically -->
                </div>
            </div>

            <!-- Profile Details -->
            <div class="profile-details" id="profileDetails">
                <!-- Details will be inserted dynamically -->
            </div>

            <!-- Footer -->
            <div class="profile-footer">
                <div class="footer-brand">Powered by</div>
                <a href="https://scan2reach.com" class="footer-logo" target="_blank">Scan2Reach</a>
            </div>
        </div>
    </div>

    <script type="module">
        // ==================== Firebase Setup ====================
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getFirestore, 
            doc, 
            getDoc, 
            updateDoc, 
            increment, 
            serverTimestamp, 
            addDoc, 
            collection 
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyATdL0mgIrfRhfZ17jeAIHPcwFcX4_zspA",
            authDomain: "scan2reach-new.firebaseapp.com",
            projectId: "scan2reach-new",
            storageBucket: "scan2reach-new.firebasestorage.app",
            messagingSenderId: "466815844554",
            appId: "1:466815844554:web:caf16651ec18d026d8b433"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ==================== Global Variables ====================
        let currentProfile = null;
        let currentProfileId = null;

        // ==================== Utility Functions ====================
        
        /**
         * Show toast notification
         */
        function showToast(message, type = 'default') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        /**
         * Extract profile ID from URL (supports multiple formats)
         */
        function extractProfileId() {
            console.log('🔍 Extracting profile ID from URL');
            console.log('📍 Full URL:', window.location.href);
            console.log('📍 Pathname:', window.location.pathname);
            console.log('📍 Search:', window.location.search);
            console.log('📍 Hash:', window.location.hash);

            let profileId = null;

            // Method 1: Query parameter (?id=xxx)
            const urlParams = new URLSearchParams(window.location.search);
            profileId = urlParams.get('id');
            if (profileId) {
                console.log('✅ Found ID via query param:', profileId);
                return profileId;
            }

            // Method 2: Hash-based (#/xxx or #xxx)
            if (window.location.hash) {
                const hash = window.location.hash;
                if (hash.startsWith('#/')) {
                    profileId = hash.substring(2);
                } else if (hash.startsWith('#')) {
                    profileId = hash.substring(1);
                }
                if (profileId && profileId.length > 5) {
                    console.log('✅ Found ID via hash:', profileId);
                    return profileId;
                }
            }

            // Method 3: Path-based (/profile/xxx or /p/xxx)
            const pathPatterns = [
                /\/profile\/([^\/\?#]+)/,
                /\/p\/([^\/\?#]+)/,
                /\/card\/([^\/\?#]+)/,
                /\/c\/([^\/\?#]+)/
            ];
            
            for (const pattern of pathPatterns) {
                const match = window.location.pathname.match(pattern);
                if (match && match[1]) {
                    profileId = match[1];
                    console.log('✅ Found ID via path pattern:', profileId);
                    return profileId;
                }
            }

            // Method 4: Last path segment (fallback)
            const pathParts = window.location.pathname.split('/').filter(p => p);
            if (pathParts.length > 0) {
                const lastPart = pathParts[pathParts.length - 1];
                // Exclude known page names
                const excludedNames = ['card-profile.html', 'profile.html', 'index.html', 'card-profile', 'profile'];
                if (!excludedNames.includes(lastPart.toLowerCase()) && lastPart.length > 5) {
                    profileId = lastPart.replace('.html', '');
                    console.log('✅ Found ID via last path segment:', profileId);
                    return profileId;
                }
            }

            console.log('❌ No profile ID found');
            return null;
        }

        function formatWhatsAppNumber(number) {

        /**
         * Check if profile is expired
         */
        function isProfileExpired(expiresAt) {
            if (!expiresAt) return false;
            
            let expiryDate;
            if (typeof expiresAt === 'string') {
                expiryDate = new Date(expiresAt);
            } else if (expiresAt.toDate) {
                expiryDate = expiresAt.toDate();
            } else if (expiresAt instanceof Date) {
                expiryDate = expiresAt;
            } else {
                return false;
            }
            
            return expiryDate < new Date();
        }

        /**
         * Fetch profile with retry logic
         */
        async function fetchProfileWithRetry(profileId, maxRetries = 3) {
            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    console.log(`📡 Fetch attempt ${attempt}/${maxRetries}...`);
                    const profileRef = doc(db, 'profiles', profileId);
                    const profileSnap = await getDoc(profileRef);
                    console.log('✅ Fetch successful');
                    return profileSnap;
                } catch (error) {
                    console.warn(`⚠️ Attempt ${attempt} failed:`, error.message);
                    if (attempt === maxRetries) throw error;
                    // Wait before retry (exponential backoff)
                    await new Promise(resolve => setTimeout(resolve, 1000 * attempt));
                }
            }
        }

        /**
         * Ensure URL has https://
         */
        function ensureHttps(url) {

                return url;
            }
            return 'https://' + url;

        // ==================== VCard Generation ====================

        /**
         * Generate and download vCard
         */
        window.saveContact = function() {
            if (!currentProfile) {
                showToast('Unable to save contact', 'error');
                return;
            }

            try {
                const profile = currentProfile;
                
                // Build vCard 3.0
                const vcard = [
                    'BEGIN:VCARD',
                    'VERSION:3.0',
                    `FN:${profile.fullName || 'Contact'}`,
                    `N:${(profile.fullName || '').split(' ').reverse().join(';')};;;`,
                    profile.companyName ? `ORG:${profile.companyName}` : '',
                    profile.designation ? `TITLE:${profile.designation}` : '',
                    profile.phoneNumber ? `TEL;TYPE=CELL:${profile.phoneNumber}` : '',
                    profile.whatsappNumber && profile.whatsappNumber !== profile.phoneNumber ? 
                        `TEL;TYPE=WORK:${profile.whatsappNumber}` : '',
                    profile.email ? `EMAIL:${profile.email}` : '',
                    profile.address ? `ADR;TYPE=WORK:;;${profile.address};;;;` : '',
                    profile.website ? `URL:${ensureHttps(profile.website)}` : '',
                    profile.linkedin ? `X-SOCIALPROFILE;TYPE=linkedin:${profile.linkedin}` : '',
                    profile.bio ? `NOTE:${profile.bio.replace(/\n/g, '\\n')}` : '',
                    profile.profilePhotoUrl ? `PHOTO;VALUE=URI:${profile.profilePhotoUrl}` : '',
                    'END:VCARD'
                ].filter(line => line).join('\r\n');

                // Create and download file
                const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${(profile.fullName || 'contact').replace(/\s+/g, '_')}.vcf`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);

                showToast('✅ Contact saved successfully!', 'success');
                trackAction('save_contact');

            } catch (error) {
                console.error('Error saving contact:', error);
                showToast('Failed to save contact', 'error');
            }
        };

        /**
         * Get device type
         */
        function getDeviceType() {
            const ua = navigator.userAgent;
            if (/tablet|ipad|playbook|silk/i.test(ua)) return 'tablet';
            if (/mobile|iphone|ipod|android|blackberry|opera mini|iemobile/i.test(ua)) return 'mobile';
            return 'desktop';
        }

        // ==================== Main Load Function ====================

        async function loadProfile() {
            console.log('🚀 Starting profile load...');
            console.log('📍 URL:', window.location.href);

            // Set loading timeout
            const loadingTimeout = setTimeout(() => {
                console.error('❌ Loading timeout reached');
                showError('Profile is taking too long to load. Please check your connection and try again.');
            }, 15000); // 15 seconds timeout

            try {
                // Extract profile ID
                const profileId = extractProfileId();

                if (!profileId) {
                    clearTimeout(loadingTimeout);
                    showError('Invalid profile URL. Please check the link and try again.');
                    return;
                }

                currentProfileId = profileId;
                console.log('✅ Profile ID:', profileId);

                // Fetch profile with retry
                const profileSnap = await fetchProfileWithRetry(profileId);

                if (!profileSnap.exists()) {
                    clearTimeout(loadingTimeout);
                    console.error('❌ Profile document not found');
                    showError('This profile doesn\'t exist. It may have been deleted or the link is incorrect.');
                    return;
                }

                // Get and standardize profile data
                const rawData = profileSnap.data();
                console.log('📄 Raw profile data:', rawData);

                const profile = standardizeProfileData(rawData);
                currentProfile = profile;

                // Check profile type - redirect if vehicle
                const profileType = profile.productType.toLowerCase();
                console.log('📋 Profile type:', profileType);

                if (profileType === 'vehicle' || profileType === 'vehicle-pro' || profileType === 'vehicle_qr') {
                    console.log('🚗 Redirecting to vehicle profile page...');
                    clearTimeout(loadingTimeout);
                    window.location.href = `/vehicle-profile.html?id=${profileId}`;
                    return;
                }

                // Check if profile is active
                if (!profile.isActive) {
                    clearTimeout(loadingTimeout);
                    showError('This profile has been deactivated by the owner.');
                    return;
                }

                // Check expiration
                const isExpired = isProfileExpired(profile.expiresAt);
                console.log('⏰ Profile expired:', isExpired);

                // Hide loading, show content
                clearTimeout(loadingTimeout);
                document.getElementById('loadingState').classList.add('hide');
                document.getElementById('profileContent').classList.remove('hide');

                // Render profile
                renderProfile(profile, isExpired);

                // Update page title and meta
                document.title = `${profile.fullName || 'Profile'} - Scan2Reach`;

                // Track visit (only if not expired)
                if (!isExpired) {
                    trackVisit(profileId);
                }

                console.log('✅ Profile loaded and rendered successfully!');

            } catch (error) {
                clearTimeout(loadingTimeout);
                console.error('❌ Error loading profile:', error);
                
                // Provide specific error messages
                if (error.code === 'permission-denied') {
                    showError('You don\'t have permission to view this profile.');
                } else if (error.code === 'unavailable') {
                    showError('Service temporarily unavailable. Please try again later.');
                } else {
                    showError('Unable to load profile. Please check your internet connection and try again.');
                }
            }
        }

        // ==================== Initialize ====================
        
        // Load profile when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadProfile);
        } else {
            loadProfile();
        }

        // Handle browser back/forward
        window.addEventListener('popstate', loadProfile);

        // Debug helper - expose to console
        window.debugProfile = {
            getCurrentProfile: () => currentProfile,
            getProfileId: () => currentProfileId,
            reloadProfile: loadProfile
        };

    </script>
</body>
</html>
