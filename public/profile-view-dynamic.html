<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Scan2Reach</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="View digital profile on Scan2Reach">
    <meta property="og:title" content="Scan2Reach Profile">
    <meta property="og:description" content="Secure digital profile with QR code">
    <meta property="og:type" content="profile">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        /* ==================== LOADING STATE ==================== */
        .loading-container {
            background: white;
            border-radius: 24px;
            padding: 3rem 2rem;
            max-width: 400px;
            width: 100%;
            margin: 100px auto;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.3s ease;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==================== PROFILE CONTAINER ==================== */
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
            display: none;
        }

        .profile-container.visible {
            display: block;
        }

        /* ==================== STATUS BANNERS ==================== */
        .status-banner {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            border-left: 5px solid;
        }

        .status-banner.expired {
            border-left-color: var(--warning);
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
        }

        .status-banner.suspended {
            border-left-color: var(--danger);
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
        }

        .status-banner h3 {
            color: var(--gray-900);
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-banner p {
            color: var(--gray-700);
            font-size: 0.95rem;
        }

        /* ==================== PROFILE CARD ==================== */
        .profile-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* Header Section */
        .profile-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 3s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.3; }
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 auto 1rem;
            border: 5px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }

        .profile-name {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .profile-subtitle {
            font-size: 1rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        /* Vehicle Badge */
        .vehicle-badge {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            display: inline-block;
            margin-top: 1rem;
            position: relative;
            z-index: 1;
        }

        /* Body Section */
        .profile-body {
            padding: 2rem;
        }

        .info-grid {
            display: grid;
            gap: 1.25rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--gray-50);
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .info-item:hover {
            background: var(--gray-100);
            transform: translateX(5px);
        }

        .info-icon {
            width: 48px;
            height: 48px;
            min-width: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .info-icon svg {
            width: 24px;
            height: 24px;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-900);
            word-break: break-word;
        }

        /* Action Buttons */
        .profile-actions {
            padding: 0 2rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(16, 185, 129, 0.4);
        }

        .btn-primary:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-secondary {
            background: white;
            color: var(--gray-700);
            border: 2px solid var(--gray-200);
        }

        .btn-secondary:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
        }

        .btn svg {
            width: 20px;
            height: 20px;
        }

        /* Stats Badge */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            padding: 1.5rem 2rem;
            background: var(--gray-50);
        }

        .stat-item {
            text-align: center;
            padding: 1rem;
            background: white;
            border-radius: 12px;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary);
            display: block;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Error State */
        .error-container {
            background: white;
            border-radius: 24px;
            padding: 3rem 2rem;
            max-width: 500px;
            width: 100%;
            margin: 100px auto;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .error-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--danger);
        }

        .error-icon svg {
            width: 40px;
            height: 40px;
        }

        .error-title {
            font-size: 1.5rem;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .error-message {
            color: var(--gray-600);
            margin-bottom: 1.5rem;
        }

        /* ==================== CALL MODAL ==================== */
        .call-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .call-modal.active {
            display: flex;
        }

        .call-content {
            background: white;
            border-radius: 24px;
            padding: 3rem 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .call-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 auto 1.5rem;
            animation: ripple 1.5s ease infinite;
        }

        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7); }
            50% { box-shadow: 0 0 0 20px rgba(102, 126, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0); }
        }

        .call-status {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .call-subtitle {
            color: var(--gray-500);
            margin-bottom: 2rem;
        }

        .call-timer {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 2rem;
        }

        .call-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .call-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .call-btn:hover {
            transform: scale(1.1);
        }

        .call-btn.accept {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
        }

        .call-btn.reject {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
        }

        .call-btn svg {
            width: 24px;
            height: 24px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .profile-name {
                font-size: 1.5rem;
            }

            .vehicle-badge {
                font-size: 1.25rem;
                padding: 0.5rem 1rem;
            }

            .profile-body {
                padding: 1.5rem;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }
        }

        /* Hide initially */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Loading State -->
    <div class="loading-container" id="loadingContainer">
        <div class="spinner"></div>
        <h2>Loading Profile</h2>
        <p>Please wait while we fetch the details...</p>
    </div>

    <!-- Error State -->
    <div class="error-container hidden" id="errorContainer">
        <div class="error-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>
        <h2 class="error-title" id="errorTitle">Profile Not Found</h2>
        <p class="error-message" id="errorMessage">The profile you're looking for doesn't exist or has been removed.</p>
        <a href="/" class="btn btn-primary">Go to Homepage</a>
    </div>

    <!-- Profile Container -->
    <div class="profile-container" id="profileContainer">
        <!-- Status Banner (Expired/Suspended) -->
        <div class="status-banner hidden" id="statusBanner">
            <h3>
                <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <span id="statusTitle">Status</span>
            </h3>
            <p id="statusMessage"></p>
        </div>

        <!-- Profile Card -->
        <div class="profile-card">
            <!-- Header -->
            <div class="profile-header">
                <div class="avatar" id="avatar">?</div>
                <h1 class="profile-name" id="profileName">Loading...</h1>
                <p class="profile-subtitle" id="profileSubtitle"></p>
                <div class="vehicle-badge hidden" id="vehicleBadge"></div>
            </div>

            <!-- Stats -->
            <div class="stats-container hidden" id="statsContainer">
                <div class="stat-item">
                    <span class="stat-value" id="scanCount">0</span>
                    <span class="stat-label">Total Scans</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="callCount">0</span>
                    <span class="stat-label">Total Calls</span>
                </div>
            </div>

            <!-- Body -->
            <div class="profile-body">
                <div class="info-grid" id="infoGrid">
                    <!-- Info items will be dynamically inserted -->
                </div>
            </div>

            <!-- Actions -->
            <div class="profile-actions" id="profileActions">
                <!-- Action buttons will be dynamically inserted -->
            </div>
        </div>
    </div>

    <!-- Call Modal -->
    <div class="call-modal" id="callModal">
        <div class="call-content">
            <div class="call-avatar" id="callAvatar">?</div>
            <div class="call-status" id="callStatus">Connecting...</div>
            <div class="call-subtitle" id="callSubtitle">Please wait</div>
            <div class="call-timer hidden" id="callTimer">00:00</div>
            <div class="call-actions" id="callActions">
                <button class="call-btn reject" id="endCallBtn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden audio element for remote stream -->
    <audio id="remoteAudio" autoplay></audio>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js';

        const firebaseConfig = {
            apiKey: "AIzaSyATdL0mgIrfRhfZ17jeAIHPcwFcX4_zspA",
            authDomain: "scan2reach-new.firebaseapp.com",
            projectId: "scan2reach-new",
            storageBucket: "scan2reach-new.firebasestorage.app",
            messagingSenderId: "466815844554",
            appId: "1:466815844554:web:caf16651ec18d026d8b433"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const functions = getFunctions(app, 'asia-south1');

        // Global state
        let currentProfileId = null;
        let currentProfile = null;
        let peerConnection = null;
        let localStream = null;
        let callDocRef = null;
        let callStartTime = null;
        let timerInterval = null;

        // WebRTC Configuration
        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
            ]
        };

        // ==================== EXTRACT PROFILE ID FROM URL ====================
        function getProfileIdFromUrl() {
            const path = window.location.pathname;
            const segments = path.split('/').filter(s => s);
            
            if (segments.length >= 2) {
                return segments[segments.length - 1];
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        // ==================== LOAD PROFILE ====================
        async function loadProfile() {
            const profileId = getProfileIdFromUrl();

            if (!profileId) {
                showError('Invalid URL', 'Profile ID is missing from the URL.');
                return;
            }

            currentProfileId = profileId;

            try {
                // Sign in anonymously for public access
                await signInAnonymously(auth);

                // Call Cloud Function to get profile
                const getProfileSecure = httpsCallable(functions, 'getProfileSecure');
                const result = await getProfileSecure({ profileId });
                currentProfile = result.data;

                console.log('✅ Profile loaded:', currentProfile);

                // Increment scan count
                try {
                    const incrementScan = httpsCallable(functions, 'incrementScanCount');
                    await incrementScan({ profileId });
                } catch (scanError) {
                    console.warn('Scan count increment failed:', scanError);
                }

                // Display profile
                displayProfile(currentProfile, profileId);

            } catch (error) {
                console.error('❌ Error loading profile:', error);
                
                if (error.code === 'functions/not-found') {
                    showError('Profile Not Found', 'This profile does not exist.');
                } else {
                    showError('Error Loading Profile', error.message || 'An unexpected error occurred.');
                }
            }
        }

        // ==================== DISPLAY PROFILE ====================
        function displayProfile(profile, profileId) {
            document.getElementById('loadingContainer').classList.add('hidden');
            document.getElementById('profileContainer').classList.add('visible');

            // Show status banner if needed
            if (profile.expired || profile.blocked) {
                const banner = document.getElementById('statusBanner');
                banner.classList.remove('hidden');
                
                if (profile.expired) {
                    banner.classList.add('expired');
                    document.getElementById('statusTitle').textContent = 'Subscription Expired';
                    document.getElementById('statusMessage').textContent = 
                        profile.message || 'This profile\'s subscription has expired. Contact the owner to renew.';
                } else if (profile.blocked) {
                    banner.classList.add('suspended');
                    document.getElementById('statusTitle').textContent = 'Profile Suspended';
                    document.getElementById('statusMessage').textContent = 
                        profile.message || 'This profile has been suspended.';
                }
            }

            // Avatar
            const avatar = document.getElementById('avatar');
            avatar.textContent = profile.fullName ? profile.fullName.charAt(0).toUpperCase() : '?';
            document.getElementById('callAvatar').textContent = avatar.textContent;

            // Name
            document.getElementById('profileName').textContent = profile.fullName || 'Unknown';

            // Subtitle
            const subtitle = profile.jobTitle && profile.company 
                ? `${profile.jobTitle} at ${profile.company}`
                : profile.jobTitle || profile.company || '';
            
            document.getElementById('profileSubtitle').textContent = subtitle;

            // Vehicle badge
            if (profile.productType === 'vehicle' && profile.vehicleNumber) {
                const vehicleBadge = document.getElementById('vehicleBadge');
                vehicleBadge.textContent = profile.vehicleNumber;
                vehicleBadge.classList.remove('hidden');
            }

            // Stats
            if (profile.scanCount !== undefined || profile.callCount !== undefined) {
                const statsContainer = document.getElementById('statsContainer');
                statsContainer.classList.remove('hidden');
                document.getElementById('scanCount').textContent = profile.scanCount || 0;
                document.getElementById('callCount').textContent = profile.callCount || 0;
            }

            // Info grid
            const infoGrid = document.getElementById('infoGrid');
            infoGrid.innerHTML = '';

            if (profile.productType === 'vehicle' && profile.vehicleNumber) {
                addInfoItem(infoGrid, 'Vehicle Number', profile.vehicleNumber, 
                    `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>`
                );
            }

            if (profile.email) {
                addInfoItem(infoGrid, 'Email', profile.email,
                    `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>`
                );
            }

            if (profile.company) {
                addInfoItem(infoGrid, 'Company', profile.company,
                    `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>`
                );
            }

            // Actions
            const actionsContainer = document.getElementById('profileActions');
            actionsContainer.innerHTML = '';

            // Call button (for vehicle profiles with active subscription)
            if (profile.productType === 'vehicle' && !profile.expired && !profile.blocked) {
                const callBtn = document.createElement('button');
                callBtn.className = 'btn btn-primary';
                callBtn.id = 'startCallBtn';
                callBtn.innerHTML = `
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                    </svg>
                    Call Owner (Browser)
                `;
                callBtn.onclick = initiateCall;
                actionsContainer.appendChild(callBtn);
            }

            // Share button
            if (navigator.share) {
                const shareBtn = document.createElement('button');
                shareBtn.className = 'btn btn-secondary';
                shareBtn.innerHTML = `
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                    </svg>
                    Share Profile
                `;
                shareBtn.onclick = shareProfile;
                actionsContainer.appendChild(shareBtn);
            }
        }

        // ==================== WEBRTC CALLING ====================
        async function initiateCall() {
            try {
                // Validate call request via Cloud Function
                const validateCall = httpsCallable(functions, 'validateCallRequest');
                const validation = await validateCall({ profileId: currentProfileId });

                if (!validation.data.valid) {
                    alert('Unable to initiate call. Please try again later.');
                    return;
                }

                // Request microphone permission
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

                // Show call modal
                document.getElementById('callModal').classList.add('active');
                document.getElementById('callStatus').textContent = 'Connecting...';
                document.getElementById('callSubtitle').textContent = 'Setting up secure connection';

                // Create peer connection
                peerConnection = new RTCPeerConnection(rtcConfig);

                // Add local stream
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });

                // Handle remote stream
                peerConnection.ontrack = (event) => {
                    const remoteAudio = document.getElementById('remoteAudio');
                    remoteAudio.srcObject = event.streams[0];
                    
                    // Call connected
                    document.getElementById('callStatus').textContent = 'Connected';
                    document.getElementById('callSubtitle').textContent = currentProfile.fullName;
                    document.getElementById('callTimer').classList.remove('hidden');
                    startCallTimer();
                };

                // Handle ICE candidates
                peerConnection.onicecandidate = async (event) => {
                    if (event.candidate) {
                        await addDoc(collection(db, 'callRequests', callDocRef.id, 'candidates'), {
                            candidate: event.candidate.toJSON(),
                            timestamp: serverTimestamp()
                        });
                    }
                };

                // Create offer
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                // Create call request in Firestore
                callDocRef = await addDoc(collection(db, 'callRequests'), {
                    callerId: auth.currentUser.uid,
                    ownerId: validation.data.ownerId,
                    vehicleProfileId: currentProfileId,
                    status: 'ringing',
                    offer: {
                        type: offer.type,
                        sdp: offer.sdp
                    },
                    answer: null,
                    createdAt: serverTimestamp()
                });

                // Listen for answer
                onSnapshot(doc(db, 'callRequests', callDocRef.id), async (snapshot) => {
                    const data = snapshot.data();
                    
                    if (data.answer && !peerConnection.currentRemoteDescription) {
                        const answer = new RTCSessionDescription(data.answer);
                        await peerConnection.setRemoteDescription(answer);
                    }

                    if (data.status === 'rejected') {
                        endCall('Call rejected');
                    }
                });

                // Listen for ICE candidates from owner
                onSnapshot(collection(db, 'callRequests', callDocRef.id, 'candidates'), (snapshot) => {
                    snapshot.docChanges().forEach(async (change) => {
                        if (change.type === 'added') {
                            const candidate = new RTCIceCandidate(change.doc.data().candidate);
                            await peerConnection.addIceCandidate(candidate);
                        }
                    });
                });

            } catch (error) {
                console.error('Call initiation error:', error);
                alert('Failed to initiate call: ' + error.message);
                endCall();
            }
        }

        function startCallTimer() {
            callStartTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
                const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const seconds = (elapsed % 60).toString().padStart(2, '0');
                document.getElementById('callTimer').textContent = `${minutes}:${seconds}`;
            }, 1000);
        }

        async function endCall(message = null) {
            // Clear timer
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            // Calculate duration
            const duration = callStartTime ? Math.floor((Date.now() - callStartTime) / 1000) : 0;

            // Close peer connection
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }

            // Stop local stream
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            // Update call document
            if (callDocRef && duration > 0) {
                try {
                    const endCallFunc = httpsCallable(functions, 'endCall');
                    await endCallFunc({ callId: callDocRef.id, duration });
                } catch (error) {
                    console.error('Failed to log call:', error);
                }
            }

            // Hide modal
            document.getElementById('callModal').classList.remove('active');

            if (message) {
                alert(message);
            }
        }

        // ==================== HELPER FUNCTIONS ====================
        function addInfoItem(container, label, value, iconPath) {
            if (!value) return;

            const item = document.createElement('div');
            item.className = 'info-item';
            item.innerHTML = `
                <div class="info-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        ${iconPath}
                    </svg>
                </div>
                <div class="info-content">
                    <div class="info-label">${label}</div>
                    <div class="info-value">${value}</div>
                </div>
            `;
            container.appendChild(item);
        }

        function showError(title, message) {
            document.getElementById('loadingContainer').classList.add('hidden');
            document.getElementById('errorContainer').classList.remove('hidden');
            document.getElementById('errorTitle').textContent = title;
            document.getElementById('errorMessage').textContent = message;
        }

        function shareProfile() {
            if (navigator.share) {
                navigator.share({
                    title: `${currentProfile.fullName} - Scan2Reach`,
                    text: `Check out ${currentProfile.fullName}'s profile on Scan2Reach`,
                    url: window.location.href
                }).catch(err => console.log('Share failed:', err));
            }
        }

        // ==================== EVENT LISTENERS ====================
        document.getElementById('endCallBtn').addEventListener('click', () => {
            endCall();
        });

        // ==================== INITIALIZE ====================
        loadProfile();
    </script>
</body>
