<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loading Profile... - Scan2Reach</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📇</text></svg>">
    
    <!-- Open Graph for Sharing -->
    <meta property="og:title" content="Digital Business Card - Scan2Reach">
    <meta property="og:description" content="View this digital business card and save contact instantly">
    <meta property="og:type" content="profile">
    <meta property="og:image" content="https://scan2reach.com/og-image.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Digital Business Card - Scan2Reach">
    
    <!-- Deep Link Meta Tags -->
    <meta property="al:android:url" content="scan2reach://profile/">
    <meta property="al:android:package" content="com.scan2reach.app">
    <meta property="al:android:app_name" content="Scan2Reach">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --white: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            padding-bottom: 100px;
        }

        /* ========== APP BANNER ========== */
        .app-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 1000;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .app-banner.show {
            transform: translateY(0);
        }

        .app-banner-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .app-banner-info {
            flex: 1;
            min-width: 0;
        }

        .app-banner-title {
            color: white;
            font-weight: 700;
            font-size: 0.9375rem;
        }

        .app-banner-subtitle {
            color: var(--gray-400);
            font-size: 0.75rem;
        }

        .app-banner-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .app-banner-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .app-banner-close {
            background: none;
            border: none;
            color: var(--gray-500);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.5rem;
            margin-left: 0.25rem;
        }

        body.has-banner {
            padding-top: 70px;
        }

        /* ========== PROFILE CARD ========== */
        .profile-card {
            background: var(--white);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            margin-top: 1rem;
            position: relative;
        }

        /* ========== COVER & AVATAR ========== */
        .cover-section {
            position: relative;
            height: 140px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }

        .cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-container {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--white);
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ========== PROFILE INFO ========== */
        .profile-info {
            padding: 60px 1.5rem 1.5rem;
            text-align: center;
        }

        .profile-name {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--gray-900);
            margin-bottom: 0.25rem;
        }

        .profile-designation {
            font-size: 1rem;
            color: var(--gray-500);
            margin-bottom: 0.5rem;
        }

        .profile-company {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.9375rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .profile-bio {
            font-size: 0.9375rem;
            color: var(--gray-600);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        /* ========== ACTION BUTTONS ========== */
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            padding: 0 1.5rem 1.5rem;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9375rem;
            text-decoration: none;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            grid-column: span 2;
        }

        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .action-btn.secondary {
            background: var(--gray-100);
            color: var(--gray-700);
        }

        .action-btn.secondary:hover {
            background: var(--gray-200);
        }

        .action-btn.call {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }

        .action-btn.call:hover {
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        .action-btn.whatsapp {
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
        }

        .action-btn.email {
            background: linear-gradient(135deg, #ea4335, #c5221f);
            color: white;
        }

        /* ========== CONTACT DETAILS ========== */
        .contact-section {
            padding: 0 1.5rem 1.5rem;
        }

        .section-title {
            font-size: 0.8125rem;
            font-weight: 700;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--gray-50);
            border-radius: 12px;
            margin-bottom: 0.75rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }

        .contact-item:hover {
            background: var(--gray-100);
            transform: translateX(4px);
        }

        .contact-item:last-child {
            margin-bottom: 0;
        }

        .contact-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            flex-shrink: 0;
        }

        .contact-icon.phone {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .contact-icon.email {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .contact-icon.location {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
        }

        .contact-icon.website {
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-label {
            font-size: 0.75rem;
            color: var(--gray-500);
            margin-bottom: 0.125rem;
        }

        .contact-value {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--gray-800);
            word-break: break-word;
        }

        /* ========== SOCIAL LINKS ========== */
        .social-section {
            padding: 0 1.5rem 1.5rem;
        }

        .social-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }

        .social-link {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.375rem;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-link:hover {
            transform: translateY(-4px) scale(1.1);
        }

        .social-link.linkedin { background: linear-gradient(135deg, #0077b5, #005885); }
        .social-link.twitter { background: linear-gradient(135deg, #1da1f2, #0d8ecf); }
        .social-link.facebook { background: linear-gradient(135deg, #1877f2, #0d65d9); }
        .social-link.instagram { background: linear-gradient(135deg, #e4405f, #c13584, #833ab4); }
        .social-link.youtube { background: linear-gradient(135deg, #ff0000, #cc0000); }
        .social-link.github { background: linear-gradient(135deg, #333, #24292e); }
        .social-link.whatsapp { background: linear-gradient(135deg, #25d366, #128c7e); }
        .social-link.telegram { background: linear-gradient(135deg, #0088cc, #006699); }

        /* ========== FOOTER ========== */
        .profile-footer {
            padding: 1.5rem;
            text-align: center;
            border-top: 1px solid var(--gray-100);
        }

        .powered-by {
            font-size: 0.8125rem;
            color: var(--gray-400);
        }

        .powered-by a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .get-yours {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
            padding: 0.625rem 1.25rem;
            background: var(--gray-100);
            color: var(--gray-700);
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.8125rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .get-yours:hover {
            background: var(--primary);
            color: white;
        }

        /* ========== EMERGENCY BANNER ========== */
        .emergency-banner {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .emergency-banner:hover {
            filter: brightness(1.1);
        }

        .emergency-icon {
            font-size: 1.5rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .emergency-info {
            flex: 1;
        }

        .emergency-title {
            font-weight: 700;
            font-size: 0.9375rem;
        }

        .emergency-subtitle {
            font-size: 0.8125rem;
            opacity: 0.9;
        }

        .emergency-arrow {
            font-size: 1.25rem;
        }

        /* ========== LOADING STATE ========== */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--gray-500);
            font-size: 0.9375rem;
        }

        /* ========== ERROR STATE ========== */
        .error-state {
            text-align: center;
            padding: 3rem 2rem;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .error-text {
            color: var(--gray-500);
            margin-bottom: 1.5rem;
        }

        /* ========== INACTIVE STATE ========== */
        .inactive-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            z-index: 10;
            border-radius: 24px;
        }

        .inactive-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .inactive-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .inactive-text {
            color: var(--gray-500);
            font-size: 0.9375rem;
            margin-bottom: 1rem;
        }

        .inactive-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9375rem;
        }

        /* ========== FLOATING APP BUTTON ========== */
        .floating-app-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, var(--gray-900), var(--gray-800));
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9375rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 100;
            transition: all 0.3s;
        }

        .floating-app-btn:hover {
            transform: translateX(-50%) translateY(-4px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
        }

        .floating-app-btn i {
            font-size: 1.25rem;
            color: #3ddc84;
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--gray-900);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9375rem;
            z-index: 2000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: transform 0.3s ease;
            max-width: 90vw;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: linear-gradient(135deg, var(--success), #059669);
        }

        .toast.error {
            background: linear-gradient(135deg, var(--danger), #dc2626);
        }

        /* ========== VIEW COUNTER ========== */
        .view-counter {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--gray-50);
            color: var(--gray-500);
            font-size: 0.8125rem;
            border-top: 1px solid var(--gray-100);
        }

        .view-counter i {
            color: var(--primary);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 480px) {
            .profile-card {
                border-radius: 20px;
            }

            .profile-name {
                font-size: 1.5rem;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .action-btn.primary {
                grid-column: span 1;
            }

            .floating-app-btn {
                left: 20px;
                right: 20px;
                transform: translateX(0);
            }

            .floating-app-btn:hover {
                transform: translateY(-4px);
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- App Banner (Shows on mobile) -->
    <div class="app-banner" id="appBanner">
        <div class="app-banner-icon">📇</div>
        <div class="app-banner-info">
            <div class="app-banner-title">Scan2Reach</div>
            <div class="app-banner-subtitle">Get instant call notifications</div>
        </div>
        <button class="app-banner-btn" id="openAppBtn">Open App</button>
        <button class="app-banner-close" id="closeBannerBtn">&times;</button>
    </div>

    <!-- Profile Card -->
    <div class="profile-card" id="profileCard">
        <!-- Loading State -->
        <div class="loading-state" id="loadingState">
            <div class="loading-spinner"></div>
            <p class="loading-text">Loading profile...</p>
        </div>

        <!-- Error State -->
        <div class="error-state hidden" id="errorState">
            <div class="error-icon">😕</div>
            <h2 class="error-title">Profile Not Found</h2>
            <p class="error-text">This profile may have been removed or the link is incorrect.</p>
            <a href="/" class="action-btn primary" style="display: inline-flex;">
                <i class="fas fa-home"></i>
                Go to Homepage
            </a>
        </div>

        <!-- Profile Content (populated by JS) -->
        <div id="profileContent" class="hidden"></div>
    </div>

    <!-- Floating App Download Button (Mobile only) -->
    <a href="#" class="floating-app-btn hidden" id="floatingAppBtn">
        <i class="fab fa-android"></i>
        <span>Download Scan2Reach App</span>
    </a>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Firebase & Script -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getFirestore, 
            doc, 
            getDoc, 
            updateDoc, 
            increment,
            collection,
            addDoc,
            serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyATdL0mgIrfRhfZ17jeAIHPcwFcX4_zspA",
            authDomain: "scan2reach-new.firebaseapp.com",
            projectId: "scan2reach-new",
            storageBucket: "scan2reach-new.firebasestorage.app",
            messagingSenderId: "466815844554",
            appId: "1:466815844554:web:caf16651ec18d026d8b433"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let profileData = null;
        let profileId = null;
        let viewTracked = false;

        // ========== GET PROFILE ID ==========
        function getProfileId() {
            const params = new URLSearchParams(window.location.search);
            // Try multiple param names
            let id = params.get('id') || params.get('profile') || params.get('p');
            
            // If not in params, check path
            if (!id) {
                const path = window.location.pathname;
                const parts = path.split('/').filter(p => p);
                // Check for /profile/ID or /p/ID pattern
                if (parts.length >= 2 && (parts[0] === 'profile' || parts[0] === 'p')) {
                    id = parts[1];
                } else if (parts.length === 1 && parts[0].length > 10) {
                    // Might be just /ID
                    id = parts[0];
                }
            }
            
            return id;
        }

        // ========== DETECT MOBILE ==========
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        function isAndroid() {
            return /Android/i.test(navigator.userAgent);
        }

        // ========== LOAD PROFILE ==========
        async function loadProfile() {
            profileId = getProfileId();
            
            console.log('📇 Loading profile:', profileId);
            
            if (!profileId) {
                console.error('❌ No profile ID found');
                showError('Invalid Link', 'No profile ID was provided in the URL.');
                return;
            }

            try {
                const profileRef = doc(db, 'profiles', profileId);
                const profileSnap = await getDoc(profileRef);

                if (!profileSnap.exists()) {
                    console.error('❌ Profile not found:', profileId);
                    showError('Profile Not Found', 'This profile may have been removed or the link is incorrect.');
                    return;
                }

                profileData = { id: profileSnap.id, ...profileSnap.data() };
                console.log('✅ Profile loaded:', profileData);

                // Track view (only once per session)
                if (!viewTracked) {
                    await trackView();
                    viewTracked = true;
                }

                // Check subscription status
                const status = profileData.subscriptionStatus || profileData.status || 'active';
                const isActive = status === 'active' || status === 'paid' || status === 'trial';

                // Render profile
                renderProfile(profileData, isActive);

                // Show app banner on mobile
                if (isMobile()) {
                    showAppBanner();
                    document.getElementById('floatingAppBtn').classList.remove('hidden');
                }

                // Update page meta tags
                updateMetaTags(profileData);

            } catch (error) {
                console.error('❌ Error loading profile:', error);
                showError('Error Loading Profile', error.message);
            }
        }

        // ========== TRACK VIEW (REAL ANALYTICS) ==========
        async function trackView() {
            try {
                console.log('📊 Tracking view for profile:', profileId);
                
                // 1. Increment view count on profile document
                const profileRef = doc(db, 'profiles', profileId);
                await updateDoc(profileRef, {
                    views: increment(1),
                    lastViewed: serverTimestamp()
                });

                // 2. Add analytics event for detailed tracking
                const analyticsRef = collection(db, 'analytics');
                await addDoc(analyticsRef, {
                    type: 'view',
                    profileId: profileId,
                    userId: profileData.userId, // Owner's user ID
                    timestamp: serverTimestamp(),
                    date: new Date().toISOString().split('T')[0], // YYYY-MM-DD
                    userAgent: navigator.userAgent || 'unknown',
                    referrer: document.referrer || 'direct',
                    screenWidth: window.innerWidth,
                    screenHeight: window.innerHeight,
                    isMobile: isMobile()
                });

                console.log('✅ View tracked successfully');
            } catch (error) {
                console.warn('⚠️ Could not track view:', error.message);
                // Don't fail the page load if tracking fails
            }
        }

        // ========== TRACK CONTACT SAVE (REAL ANALYTICS) ==========
        async function trackContactSave() {
            try {
                console.log('📊 Tracking contact save for profile:', profileId);
                
                // 1. Increment contact saves on profile document
                const profileRef = doc(db, 'profiles', profileId);
                await updateDoc(profileRef, {
                    contactSaves: increment(1),
                    lastContactSave: serverTimestamp()
                });

                // 2. Add analytics event
                const analyticsRef = collection(db, 'analytics');
                await addDoc(analyticsRef, {
                    type: 'contact_save',
                    profileId: profileId,
                    userId: profileData.userId,
                    timestamp: serverTimestamp(),
                    date: new Date().toISOString().split('T')[0],
                    isMobile: isMobile()
                });

                console.log('✅ Contact save tracked successfully');
            } catch (error) {
                console.warn('⚠️ Could not track contact save:', error.message);
            }
        }

        // ========== RENDER PROFILE ==========
        function renderProfile(profile, isActive) {
            const content = document.getElementById('profileContent');
            const loading = document.getElementById('loadingState');
            
            // Handle all possible field name variations
            const name = profile.name || profile.fullName || profile.displayName || profile.userName || 'Unnamed';
            const initials = getInitials(name);
            const designation = profile.designation || profile.title || profile.jobTitle || profile.position || '';
            const company = profile.company || profile.organization || profile.companyName || profile.org || '';
            const bio = profile.bio || profile.about || profile.description || profile.summary || '';
            const phone = profile.phone || profile.mobile || profile.phoneNumber || profile.tel || '';
            const email = profile.email || profile.emailAddress || '';
            const address = profile.address || profile.location || profile.city || '';
            const website = profile.website || profile.url || profile.web || '';
            const emergency = profile.emergencyContact || profile.isEmergency || profile.emergency || false;
            const views = profile.views || 0;

            // Profile images
            const profileImage = profile.profileImage || profile.avatar || profile.photo || profile.photoURL || profile.image || '';
            const coverImage = profile.coverImage || profile.cover || profile.banner || '';

            // Social links (check multiple structures)
            let socials = {};
            if (profile.socialLinks && typeof profile.socialLinks === 'object') {
                socials = profile.socialLinks;
            } else if (profile.socials && typeof profile.socials === 'object') {
                socials = profile.socials;
            } else {
                // Check individual fields
                socials = {
                    linkedin: profile.linkedin || profile.linkedinUrl || '',
                    twitter: profile.twitter || profile.twitterUrl || '',
                    facebook: profile.facebook || profile.facebookUrl || '',
                    instagram: profile.instagram || profile.instagramUrl || '',
                    youtube: profile.youtube || profile.youtubeUrl || '',
                    github: profile.github || profile.githubUrl || '',
                    whatsapp: profile.whatsappLink || '',
                    telegram: profile.telegram || profile.telegramUrl || ''
                };
            }

            let html = '';

            // Emergency Banner
            if (emergency && phone) {
                html += `
                    <a href="tel:${phone}" class="emergency-banner">
                        <span class="emergency-icon">🚨</span>
                        <div class="emergency-info">
                            <div class="emergency-title">Emergency Contact</div>
                            <div class="emergency-subtitle">Tap to call immediately</div>
                        </div>
                        <span class="emergency-arrow">→</span>
                    </a>
                `;
            }

            // Cover & Avatar
            html += `
                <div class="cover-section">
                    ${coverImage ? `<img src="${coverImage}" class="cover-image" alt="Cover" onerror="this.style.display='none'">` : ''}
                    <div class="avatar-container">
                        <div class="avatar">
                            ${profileImage 
                                ? `<img src="${profileImage}" alt="${escapeHtml(name)}" onerror="this.parentElement.innerHTML='${initials}'">`
                                : initials}
                        </div>
                    </div>
                </div>
            `;

            // Profile Info
            html += `
                <div class="profile-info">
                    <h1 class="profile-name">${escapeHtml(name)}</h1>
                    ${designation ? `<p class="profile-designation">${escapeHtml(designation)}</p>` : ''}
                    ${company ? `<p class="profile-company"><i class="fas fa-building"></i> ${escapeHtml(company)}</p>` : ''}
                    ${bio ? `<p class="profile-bio">${escapeHtml(bio)}</p>` : ''}
                </div>
            `;

            // Action Buttons
            html += `<div class="action-buttons">`;
            
            // Save Contact Button (always show)
            html += `
                <button class="action-btn primary" id="saveContactBtn">
                    <i class="fas fa-user-plus"></i>
                    Save Contact
                </button>
            `;

            if (phone) {
                html += `
                    <a href="tel:${phone}" class="action-btn call">
                        <i class="fas fa-phone"></i>
                        Call
                    </a>
                    <a href="https://wa.me/${phone.replace(/[^0-9]/g, '')}" class="action-btn whatsapp" target="_blank" rel="noopener">
                        <i class="fab fa-whatsapp"></i>
                        WhatsApp
                    </a>
                `;
            }

            if (email) {
                html += `
                    <a href="mailto:${email}" class="action-btn email">
                        <i class="fas fa-envelope"></i>
                        Email
                    </a>
                `;
            }

            html += `</div>`;

            // Contact Details Section
            if (phone || email || address || website) {
                html += `
                    <div class="contact-section">
                        <h3 class="section-title">Contact Details</h3>
                `;

                if (phone) {
                    html += `
                        <a href="tel:${phone}" class="contact-item">
                            <div class="contact-icon phone"><i class="fas fa-phone"></i></div>
                            <div class="contact-info">
                                <div class="contact-label">Phone</div>
                                <div class="contact-value">${escapeHtml(phone)}</div>
                            </div>
                        </a>
                    `;
                }

                if (email) {
                    html += `
                        <a href="mailto:${email}" class="contact-item">
                            <div class="contact-icon email"><i class="fas fa-envelope"></i></div>
                            <div class="contact-info">
                                <div class="contact-label">Email</div>
                                <div class="contact-value">${escapeHtml(email)}</div>
                            </div>
                        </a>
                    `;
                }

                if (address) {
                    html += `
                        <a href="https://maps.google.com/?q=${encodeURIComponent(address)}" class="contact-item" target="_blank" rel="noopener">
                            <div class="contact-icon location"><i class="fas fa-map-marker-alt"></i></div>
                            <div class="contact-info">
                                <div class="contact-label">Address</div>
                                <div class="contact-value">${escapeHtml(address)}</div>
                            </div>
                        </a>
                    `;
                }

                if (website) {
                    const websiteUrl = website.startsWith('http') ? website : 'https://' + website;
                    html += `
                        <a href="${websiteUrl}" class="contact-item" target="_blank" rel="noopener">
                            <div class="contact-icon website"><i class="fas fa-globe"></i></div>
                            <div class="contact-info">
                                <div class="contact-label">Website</div>
                                <div class="contact-value">${escapeHtml(website)}</div>
                            </div>
                        </a>
                    `;
                }

                html += `</div>`;
            }

            // Social Links
            const socialPlatforms = ['linkedin', 'twitter', 'facebook', 'instagram', 'youtube', 'github', 'whatsapp', 'telegram'];
            const hasSocials = socialPlatforms.some(p => socials[p]);

            if (hasSocials) {
                html += `
                    <div class="social-section">
                        <h3 class="section-title">Connect</h3>
                        <div class="social-grid">
                `;

                const icons = {
                    linkedin: 'fab fa-linkedin-in',
                    twitter: 'fab fa-twitter',
                    facebook: 'fab fa-facebook-f',
                    instagram: 'fab fa-instagram',
                    youtube: 'fab fa-youtube',
                    github: 'fab fa-github',
                    whatsapp: 'fab fa-whatsapp',
                    telegram: 'fab fa-telegram-plane'
                };

                socialPlatforms.forEach(platform => {
                    if (socials[platform]) {
                        let url = socials[platform];
                        // Ensure URL is complete
                        if (!url.startsWith('http') && !url.startsWith('//')) {
                            if (platform === 'whatsapp') {
                                url = `https://wa.me/${url.replace(/[^0-9]/g, '')}`;
                            } else {
                                url = 'https://' + url;
                            }
                        }
                        html += `
                            <a href="${url}" class="social-link ${platform}" target="_blank" rel="noopener">
                                <i class="${icons[platform]}"></i>
                            </a>
                        `;
                    }
                });

                html += `</div></div>`;
            }

            // View Counter
            html += `
                <div class="view-counter">
                    <i class="fas fa-eye"></i>
                    <span>${formatNumber(views + 1)} views</span>
                </div>
            `;

            // Footer
            html += `
                <div class="profile-footer">
                    <p class="powered-by">Powered by <a href="/" target="_blank">Scan2Reach</a></p>
                    <a href="/create-profile.html" class="get-yours" target="_blank">
                        <i class="fas fa-plus"></i>
                        Create Your Card
                    </a>
                </div>
            `;

            // Inactive Overlay (if subscription expired)
            if (!isActive) {
                html += `
                    <div class="inactive-overlay">
                        <div class="inactive-icon">⏸️</div>
                        <h3 class="inactive-title">Profile Inactive</h3>
                        <p class="inactive-text">This profile's subscription has expired. The owner needs to renew to make it active again.</p>
                        <a href="/" class="inactive-btn">
                            <i class="fas fa-home"></i>
                            Visit Scan2Reach
                        </a>
                    </div>
                `;
            }

            content.innerHTML = html;
            loading.classList.add('hidden');
            content.classList.remove('hidden');

            // Attach save contact event listener
            document.getElementById('saveContactBtn').addEventListener('click', saveContact);
        }

        // ========== SAVE CONTACT ==========
        async function saveContact() {
            if (!profileData) {
                showToast('Profile not loaded yet', 'error');
                return;
            }

            const name = profileData.name || profileData.fullName || profileData.displayName || 'Contact';
            const phone = profileData.phone || profileData.mobile || profileData.phoneNumber || '';
            const email = profileData.email || profileData.emailAddress || '';
            const company = profileData.company || profileData.organization || '';
            const designation = profileData.designation || profileData.title || '';
            const website = profileData.website || profileData.url || '';
            const address = profileData.address || profileData.location || '';

            // Create vCard 3.0 format
            let vcard = `BEGIN:VCARD
VERSION:3.0
FN:${name}
N:${name.split(' ').reverse().join(';')};;;
`;
            if (company) vcard += `ORG:${company}\n`;
            if (designation) vcard += `TITLE:${designation}\n`;
            if (phone) vcard += `TEL;TYPE=CELL:${phone}\n`;
            if (email) vcard += `EMAIL;TYPE=INTERNET:${email}\n`;
            if (website) vcard += `URL:${website}\n`;
            if (address) vcard += `ADR;TYPE=WORK:;;${address};;;;\n`;
            vcard += `NOTE:Created with Scan2Reach - https://scan2reach.com
END:VCARD`;

            // Create and download file
            const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${name.replace(/[^a-z0-9]/gi, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);

            // Track the contact save
            await trackContactSave();

            showToast('Contact saved! Check your downloads.', 'success');
        }

        // ========== SHOW APP BANNER ==========
        function showAppBanner() {
            const banner = document.getElementById('appBanner');
            const body = document.body;
            
            // Check if user dismissed banner recently (24 hours)
            const dismissed = localStorage.getItem('appBannerDismissed');
            if (dismissed && Date.now() - parseInt(dismissed) < 24 * 60 * 60 * 1000) {
                return;
            }

            setTimeout(() => {
                banner.classList.add('show');
                body.classList.add('has-banner');
            }, 2000);

            // Open App button - show download page for now
            document.getElementById('openAppBtn').addEventListener('click', () => {
                window.location.href = '/app-download.html';
            });

            // Close button
            document.getElementById('closeBannerBtn').addEventListener('click', () => {
                banner.classList.remove('show');
                body.classList.remove('has-banner');
                localStorage.setItem('appBannerDismissed', Date.now().toString());
            });
        }

        // ========== UPDATE META TAGS ==========
        function updateMetaTags(profile) {
            const name = profile.name || profile.fullName || 'Digital Business Card';
            const designation = profile.designation || profile.title || '';
            const company = profile.company || '';
            
            document.title = `${name} - Scan2Reach`;
            
            // Update OG tags
            const ogTitle = document.querySelector('meta[property="og:title"]');
            if (ogTitle) ogTitle.setAttribute('content', `${name} - Digital Business Card`);
            
            const ogDesc = document.querySelector('meta[property="og:description"]');
            if (ogDesc) {
                const desc = `${designation}${company ? ' at ' + company : ''} | View and save contact instantly`;
                ogDesc.setAttribute('content', desc);
            }
        }

        // ========== SHOW ERROR ==========
        function showError(title = 'Profile Not Found', message = 'This profile may have been removed or the link is incorrect.') {
            document.getElementById('loadingState').classList.add('hidden');
            const errorState = document.getElementById('errorState');
            errorState.querySelector('.error-title').textContent = title;
            errorState.querySelector('.error-text').textContent = message;
            errorState.classList.remove('hidden');
        }

        // ========== HELPERS ==========
        function getInitials(name) {
            if (!name) return '?';
            return name
                .split(' ')
                .filter(word => word.length > 0)
                .map(word => word[0])
                .join('')
                .toUpperCase()
                .slice(0, 2);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function showToast(message, type = 'default') {
            const toast = document.getElementById('toast');
            const icons = {
                success: 'check-circle',
                error: 'exclamation-circle',
                default: 'info-circle'
            };
            toast.innerHTML = `<i class="fas fa-${icons[type] || icons.default}"></i> ${message}`;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // ========== FLOATING APP BUTTON ==========
        document.getElementById('floatingAppBtn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '/app-download.html';
        });

        // ========== INIT ==========
        loadProfile();
    </script>
</body>
</html>
