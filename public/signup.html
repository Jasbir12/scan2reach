<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Scan2Reach</title>
    <meta name="description" content="Create your Scan2Reach account">
    <meta name="theme-color" content="#667eea">
    
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
            max-width: 440px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            background: linear-gradient(135deg, var(--gray-900), var(--gray-800));
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .auth-header p {
            opacity: 0.9;
            font-weight: 500;
        }

        .auth-body {
            padding: 2rem;
        }

        .message {
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }

        .message.show { display: flex; }
        .message.success { background: #d1fae5; color: #065f46; border: 2px solid #6ee7b7; }
        .message.error { background: #fee2e2; color: #991b1b; border: 2px solid #fca5a5; }
        .message.warning { background: #fef3c7; color: #92400e; border: 2px solid #fcd34d; }
        .message.info { background: #dbeafe; color: #1e40af; border: 2px solid #93c5fd; }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: var(--gray-700);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            background: var(--gray-50);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error {
            border-color: var(--error);
            background: #fef2f2;
        }

        .input-hint {
            font-size: 0.8rem;
            color: var(--gray-500);
            margin-top: 0.375rem;
        }

        .input-hint.error {
            color: var(--error);
        }

        .input-hint.success {
            color: var(--success);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray-500);
            padding: 4px;
        }

        .password-toggle:hover {
            color: var(--gray-700);
        }

        .password-strength {
            height: 4px;
            background: var(--gray-200);
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .password-strength-bar.weak { width: 33%; background: var(--error); }
        .password-strength-bar.medium { width: 66%; background: var(--warning); }
        .password-strength-bar.strong { width: 100%; background: var(--success); }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--gray-400);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }

        .divider span {
            padding: 0 1rem;
        }

        .btn-google {
            width: 100%;
            padding: 0.875rem;
            background: white;
            color: var(--gray-700);
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.625rem;
        }

        .btn-google:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gray-100);
            color: var(--gray-600);
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .terms {
            font-size: 0.8rem;
            color: var(--gray-500);
            text-align: center;
            margin-top: 1rem;
        }

        .terms a {
            color: var(--primary);
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .auth-header { padding: 2rem 1.5rem; }
            .auth-body { padding: 1.5rem; }
            .logo { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">
                <div class="logo-icon">🎯</div>
                Scan2Reach
            </div>
            <p>Create your account</p>
        </div>

        <div class="auth-body">
            <div id="message" class="message"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
                </div>

                <!-- ✅ Simple Phone Field (No +91 Required) -->
                <div class="form-group">
                    <label for="phone">Phone Number <span style="color: var(--gray-400); font-weight: 500;">(Optional)</span></label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="Enter your phone number"
                        autocomplete="tel"
                        maxlength="15"
                        inputmode="tel"
                    >
                    <div class="input-hint" id="phoneHint">For account recovery & notifications</div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div id="passwordStrengthBar" class="password-strength-bar"></div>
                    </div>
                    <div class="input-hint">Minimum 6 characters</div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary">
                    <span>Create Account</span>
                </button>
            </form>

            <div class="divider"><span>or</span></div>

            <button type="button" id="googleBtn" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Continue with Google
            </button>

            <div class="terms">
                By signing up, you agree to our 
                <a href="/terms.html">Terms of Service</a> and 
                <a href="/privacy.html">Privacy Policy</a>
            </div>

            <div class="auth-footer">
                Already have an account? <a href="/login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithPopup, 
            GoogleAuthProvider,
            updateProfile,
            sendEmailVerification
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            getDoc,
            serverTimestamp 
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyATdL0mgIrfRhfZ17jeAIHPcwFcX4_zspA",
            authDomain: "scan2reach-new.firebaseapp.com",
            projectId: "scan2reach-new",
            storageBucket: "scan2reach-new.firebasestorage.app",
            messagingSenderId: "466815844554",
            appId: "1:466815844554:web:caf16651ec18d026d8b433"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        console.log('🔥 Firebase initialized');

        // DOM Elements
        const signupForm = document.getElementById('signupForm');
        const submitBtn = document.getElementById('submitBtn');
        const googleBtn = document.getElementById('googleBtn');
        const messageDiv = document.getElementById('message');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordStrengthBar = document.getElementById('passwordStrengthBar');
        const phoneInput = document.getElementById('phone');

        // Utility Functions
        function showMessage(text, type = 'info') {
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            messageDiv.innerHTML = `<span>${icons[type] || ''}</span><span>${text}</span>`;
            messageDiv.className = `message ${type} show`;
            messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function hideMessage() {
            messageDiv.classList.remove('show');
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            if (loading) {
                submitBtn.innerHTML = '<span class="spinner"></span><span>Creating Account...</span>';
            } else {
                submitBtn.innerHTML = '<span>Create Account</span>';
            }
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 8 && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)) strength++;
            
            passwordStrengthBar.className = 'password-strength-bar';
            if (strength === 1) passwordStrengthBar.classList.add('weak');
            else if (strength === 2) passwordStrengthBar.classList.add('medium');
            else if (strength >= 3) passwordStrengthBar.classList.add('strong');
        }

        passwordInput.addEventListener('input', () => {
            checkPasswordStrength(passwordInput.value);
        });

        window.togglePassword = function(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        };

        // Create User Document
        async function createUserDocument(user, additionalData = {}) {
            const userRef = doc(db, 'users', user.uid);
            
            try {
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        uid: user.uid,
                        email: user.email,
                        displayName: additionalData.fullName || user.displayName || '',
                        phoneNumber: additionalData.phone || user.phoneNumber || '',
                        photoURL: user.photoURL || '',
                        emailVerified: user.emailVerified,
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp(),
                        provider: additionalData.provider || 'email',
                        role: 'user',
                        status: 'active'
                    });
                    console.log('✅ User document created');
                }
                
                return true;
            } catch (error) {
                console.error('❌ Error creating user document:', error);
                throw error;
            }
        }

        // Email/Password Signup
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = phoneInput.value.trim(); // ✅ Optional - no validation required
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Validation
            if (!fullName || fullName.length < 2) {
                showMessage('Please enter your full name', 'error');
                return;
            }

            if (!validateEmail(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            setLoading(true);

            try {
                console.log('📝 Creating account for:', email);

                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                console.log('✅ Auth user created:', user.uid);

                await updateProfile(user, {
                    displayName: fullName
                });

                // ✅ Store phone as-is (no +91 prefix added)
                await createUserDocument(user, {
                    fullName: fullName,
                    phone: phone, // Store whatever user entered
                    provider: 'email'
                });

                try {
                    await sendEmailVerification(user);
                    console.log('✅ Verification email sent');
                } catch (verifyError) {
                    console.warn('⚠️ Could not send verification email:', verifyError.message);
                }

                showMessage('🎉 Account created successfully! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 2000);

            } catch (error) {
                console.error('❌ Signup error:', error);
                setLoading(false);

                let errorMessage = 'An error occurred. Please try again.';

                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'This email is already registered. Please sign in instead.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Invalid email address format.';
                        break;
                    case 'auth/operation-not-allowed':
                        errorMessage = 'Email/password accounts are not enabled.';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Password is too weak. Please use a stronger password.';
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = 'Network error. Please check your internet connection.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Too many attempts. Please try again later.';
                        break;
                    default:
                        errorMessage = error.message || 'Signup failed. Please try again.';
                }

                showMessage(errorMessage, 'error');
            }
        });

        // Google Sign Up
        googleBtn.addEventListener('click', async () => {
            hideMessage();
            googleBtn.disabled = true;
            googleBtn.innerHTML = '<span class="spinner" style="border-color: #ddd; border-top-color: #667eea;"></span> Connecting...';

            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                await createUserDocument(user, {
                    fullName: user.displayName,
                    provider: 'google'
                });

                showMessage('🎉 Welcome! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1500);

            } catch (error) {
                console.error('❌ Google sign in error:', error);
                
                googleBtn.disabled = false;
                googleBtn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Continue with Google';

                let errorMessage = 'Google sign in failed. Please try again.';

                switch (error.code) {
                    case 'auth/popup-closed-by-user':
                        errorMessage = 'Sign in cancelled. Please try again.';
                        break;
                    case 'auth/popup-blocked':
                        errorMessage = 'Popup blocked. Please allow popups for this site.';
                        break;
                    case 'auth/account-exists-with-different-credential':
                        errorMessage = 'An account already exists with this email using a different sign-in method.';
                        break;
                    default:
                        if (error.message) errorMessage = error.message;
                }

                showMessage(errorMessage, 'error');
            }
        });

        console.log('✅ Signup page ready');

    </script>
</body>
</html>
