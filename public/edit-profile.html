<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Scan2Reach</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --success: #10b981;
            --success-dark: #059669;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 2rem;
            position: relative;
        }

        /* Background decoration */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--success) 0%, var(--success-dark) 100%);
            padding: 2.5rem 2rem;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -100%;
            right: -100%;
            width: 300%;
            height: 300%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 50%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.3; }
        }

        .header-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
            font-weight: 800;
        }

        .subtitle {
            opacity: 0.95;
            font-size: 1.05rem;
            position: relative;
            z-index: 1;
        }

        /* Form Body */
        .form-body {
            padding: 2.5rem 2rem;
            max-height: calc(100vh - 300px);
            overflow-y: auto;
        }

        /* Custom scrollbar */
        .form-body::-webkit-scrollbar {
            width: 8px;
        }

        .form-body::-webkit-scrollbar-track {
            background: var(--gray-100);
            border-radius: 10px;
        }

        .form-body::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 10px;
        }

        .form-body::-webkit-scrollbar-thumb:hover {
            background: var(--gray-400);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(16, 185, 129, 0.2);
            border-top-color: var(--success);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: var(--gray-600);
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            color: #1e40af;
            border-radius: 24px;
            font-size: 0.875rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.2);
        }

        /* Messages */
        .message {
            padding: 1.125rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.success {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .message.error {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .message.warning {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
            border: 1px solid #fbbf24;
        }

        /* Section Titles */
        .section-title {
            font-size: 1.25rem;
            color: var(--gray-900);
            font-weight: 700;
            margin: 2rem 0 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .section-icon {
            font-size: 1.5rem;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        label {
            display: block;
            color: var(--gray-700);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9375rem;
        }

        .required {
            color: var(--danger);
        }

        input, textarea, select {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
            background: white;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--success);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
            background: var(--gray-50);
        }

        input:disabled, textarea:disabled, select:disabled {
            background: var(--gray-100);
            cursor: not-allowed;
            opacity: 0.6;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.6;
        }

        .help-text {
            font-size: 0.8125rem;
            color: var(--gray-500);
            margin-top: 0.375rem;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .help-text svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* Buttons */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 2px solid var(--gray-200);
        }

        .btn {
            padding: 1.125rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-save {
            background: linear-gradient(135deg, var(--success) 0%, var(--success-dark) 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.35);
        }

        .btn-save:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.45);
        }

        .btn-save:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-save:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-cancel {
            background: white;
            color: var(--gray-700);
            border: 2px solid var(--gray-300);
        }

        .btn-cancel:hover {
            background: var(--gray-50);
            border-color: var(--gray-400);
        }

        /* Character counter */
        .char-counter {
            font-size: 0.75rem;
            color: var(--gray-400);
            text-align: right;
            margin-top: 0.25rem;
        }

        /* Responsive */
        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .container {
                border-radius: 20px;
            }

            .header {
                padding: 2rem 1.5rem;
            }

            .header-icon {
                font-size: 3rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .form-body {
                padding: 2rem 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .btn-group {
                grid-template-columns: 1fr;
            }

            .section-title {
                font-size: 1.125rem;
            }
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">✏️</div>
            <h1>Edit Profile</h1>
            <p class="subtitle">Update your profile details anytime</p>
        </div>

        <div class="form-body">
            <!-- Loading State -->
            <div id="loadingState" class="loading">
                <div class="spinner"></div>
                <p>Loading profile...</p>
            </div>

            <!-- Form Container -->
            <div id="formContainer" class="hidden">
                <div class="badge" id="productBadge">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    <span id="productBadgeText"></span>
                </div>
                
                <div id="message" class="message"></div>

                <form id="editForm">
                    <div id="formFields"></div>

                    <div class="btn-group">
                        <button type="button" class="btn btn-cancel" onclick="window.location.href='/my-profiles.html'">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-save" id="saveBtn">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                            </svg>
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyATdL0mgIrfRhfZ17jeAIHPcwFcX4_zspA",
            authDomain: "scan2reach-new.firebaseapp.com",
            projectId: "scan2reach-new",
            storageBucket: "scan2reach-new.firebasestorage.app",
            messagingSenderId: "466815844554",
            appId: "1:466815844554:web:caf16651ec18d026d8b433"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const profileId = urlParams.get('profileId');

        if (!profileId) {
            alert('Profile ID missing');
            window.location.href = '/my-profiles.html';
        }

        let currentUser = null;
        let profileData = null;

        // ========== AUTH CHECK ==========
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadProfile();
            } else {
                window.location.href = '/login.html';
            }
        });

        // ========== LOAD PROFILE ==========
        async function loadProfile() {
            try {
                const profileRef = doc(db, 'profiles', profileId);
                const profileSnap = await getDoc(profileRef);

                if (!profileSnap.exists()) {
                    throw new Error('Profile not found');
                }

                profileData = profileSnap.data();

                // Security check
                if (profileData.userId !== currentUser.uid) {
                    showMessage('Unauthorized access to this profile', 'error');
                    setTimeout(() => window.location.href = '/my-profiles.html', 2000);
                    return;
                }

                // ✅ Check edit permissions
                const canEdit = profileData.productType === 'card' || 
                               profileData.productType === 'vehicle-pro';

                if (!canEdit) {
                    showMessage(
                        'Editing is only available for Card and Vehicle Pro plans. ' +
                        'Your Basic Vehicle plan (₹199) is view-only. Upgrade to Pro to enable editing.',
                        'warning'
                    );
                    setTimeout(() => window.location.href = '/my-profiles.html', 4000);
                    return;
                }

                renderForm();
            } catch (error) {
                console.error('Error loading profile:', error);
                showMessage('Error loading profile: ' + error.message, 'error');
                setTimeout(() => window.location.href = '/my-profiles.html', 2000);
            }
        }

        // ========== RENDER FORM ==========
        function renderForm() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('formContainer').classList.remove('hidden');

            const productBadgeText = document.getElementById('productBadgeText');
            const formFields = document.getElementById('formFields');

            if (profileData.productType === 'card') {
                productBadgeText.textContent = 'Digital Card';
                formFields.innerHTML = `
                    <h3 class="section-title">
                        <span class="section-icon">👤</span>
                        Personal Information
                    </h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name <span class="required">*</span></label>
                            <input type="text" id="fullName" value="${escapeHtml(profileData.fullName || '')}" required placeholder="Your full name">
                        </div>
                        <div class="form-group">
                            <label>Job Title</label>
                            <input type="text" id="jobTitle" value="${escapeHtml(profileData.jobTitle || '')}" placeholder="e.g., CEO, Manager">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" id="company" value="${escapeHtml(profileData.company || '')}" placeholder="Your company">
                    </div>

                    <h3 class="section-title">
                        <span class="section-icon">📞</span>
                        Contact Details
                    </h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone Number <span class="required">*</span></label>
                            <input type="tel" id="phoneNumber" value="${escapeHtml(profileData.phoneNumber || '')}" required placeholder="+91 9876543210">
                            <p class="help-text">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                </svg>
                                Private - not shown publicly
                            </p>
                        </div>
                        <div class="form-group">
                            <label>Email <span class="required">*</span></label>
                            <input type="email" id="email" value="${escapeHtml(profileData.email || '')}" required placeholder="your@email.com">
                        </div>
                    </div>

                    <h3 class="section-title">
                        <span class="section-icon">🌐</span>
                        Additional Information
                    </h3>

                    <div class="form-group">
                        <label>Website</label>
                        <input type="url" id="website" value="${escapeHtml(profileData.website || '')}" placeholder="https://yourwebsite.com">
                    </div>

                    <div class="form-group">
                        <label>LinkedIn</label>
                        <input type="url" id="linkedin" value="${escapeHtml(profileData.linkedin || '')}" placeholder="https://linkedin.com/in/username">
                    </div>

                    <div class="form-group">
                        <label>Twitter</label>
                        <input type="url" id="twitter" value="${escapeHtml(profileData.twitter || '')}" placeholder="https://twitter.com/username">
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="address" maxlength="200">${escapeHtml(profileData.address || '')}</textarea>
                        <div class="char-counter" id="addressCounter">0/200</div>
                    </div>
                `;

                // Add character counter
                setupCharCounter('address', 200);

            } else if (profileData.productType === 'vehicle-pro') {
                productBadgeText.textContent = 'Vehicle Pro';
                formFields.innerHTML = `
                    <h3 class="section-title">
                        <span class="section-icon">🚙</span>
                        Vehicle Information
                    </h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Vehicle Number <span class="required">*</span></label>
                            <input type="text" id="vehicleNumber" value="${escapeHtml(profileData.vehicleNumber || '')}" required placeholder="DL01AB1234" style="text-transform: uppercase;">
                            <p class="help-text">Format: DL01AB1234</p>
                        </div>
                        <div class="form-group">
                            <label>Vehicle Type</label>
                            <select id="vehicleType">
                                <option value="">Select type</option>
                                <option value="Car" ${profileData.vehicleType === 'Car' ? 'selected' : ''}>Car</option>
                                <option value="Bike" ${profileData.vehicleType === 'Bike' ? 'selected' : ''}>Bike</option>
                                <option value="Scooter" ${profileData.vehicleType === 'Scooter' ? 'selected' : ''}>Scooter</option>
                                <option value="SUV" ${profileData.vehicleType === 'SUV' ? 'selected' : ''}>SUV</option>
                                <option value="Truck" ${profileData.vehicleType === 'Truck' ? 'selected' : ''}>Truck</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Vehicle Color</label>
                            <input type="text" id="vehicleColor" value="${escapeHtml(profileData.vehicleColor || '')}" placeholder="e.g., White, Black">
                        </div>
                        <div class="form-group">
                            <label>Owner Name <span class="required">*</span></label>
                            <input type="text" id="fullName" value="${escapeHtml(profileData.fullName || '')}" required placeholder="Full name">
                        </div>
                    </div>

                    <h3 class="section-title">
                        <span class="section-icon">📞</span>
                        Contact Details
                    </h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Primary Phone <span class="required">*</span></label>
                            <input type="tel" id="phoneNumber" value="${escapeHtml(profileData.phoneNumber || '')}" required placeholder="+91 9876543210">
                            <p class="help-text">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                </svg>
                                Private - not shown publicly
                            </p>
                        </div>
                        <div class="form-group">
                            <label>Alternate Phone</label>
                            <input type="tel" id="alternatePhone" value="${escapeHtml(profileData.alternatePhone || '')}" placeholder="+91 9876543210">
                        </div>
                    </div>

                    <h3 class="section-title">
                        <span class="section-icon">📝</span>
                        Additional Notes
                    </h3>

                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="notes" maxlength="500">${escapeHtml(profileData.notes || '')}</textarea>
                        <div class="char-counter" id="notesCounter">0/500</div>
                        <p class="help-text">Any additional information you want to display</p>
                    </div>
                `;

                // Add character counter
                setupCharCounter('notes', 500);
            }
        }

        // ========== HELPER FUNCTIONS ==========
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setupCharCounter(fieldId, maxLength) {
            const field = document.getElementById(fieldId);
            const counter = document.getElementById(fieldId + 'Counter');
            
            if (field && counter) {
                const updateCounter = () => {
                    counter.textContent = `${field.value.length}/${maxLength}`;
                };
                field.addEventListener('input', updateCounter);
                updateCounter();
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // ========== FORM SUBMISSION ==========
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const saveBtn = document.getElementById('saveBtn');
            const messageDiv = document.getElementById('message');

            saveBtn.disabled = true;
            saveBtn.innerHTML = `
                <div class="spinner" style="width: 18px; height: 18px; border-width: 2px; margin: 0;"></div>
                Saving...
            `;

            try {
                let updatedData = {};

                if (profileData.productType === 'card') {
                    // ✅ Using new schema field names
                    updatedData = {
                        fullName: document.getElementById('fullName').value.trim(),
                        jobTitle: document.getElementById('jobTitle').value.trim(),
                        company: document.getElementById('company').value.trim(),
                        phoneNumber: document.getElementById('phoneNumber').value.trim(),
                        email: document.getElementById('email').value.trim().toLowerCase(),
                        website: document.getElementById('website').value.trim(),
                        linkedin: document.getElementById('linkedin').value.trim(),
                        twitter: document.getElementById('twitter').value.trim(),
                        address: document.getElementById('address').value.trim(),
                        updatedAt: serverTimestamp() // ✅ Using serverTimestamp
                    };
                } else if (profileData.productType === 'vehicle-pro') {
                    // ✅ Using new schema field names
                    updatedData = {
                        vehicleNumber: document.getElementById('vehicleNumber').value.trim().toUpperCase(),
                        vehicleType: document.getElementById('vehicleType').value,
                        vehicleColor: document.getElementById('vehicleColor').value.trim(),
                        fullName: document.getElementById('fullName').value.trim(),
                        phoneNumber: document.getElementById('phoneNumber').value.trim(),
                        alternatePhone: document.getElementById('alternatePhone').value.trim(),
                        notes: document.getElementById('notes').value.trim(),
                        updatedAt: serverTimestamp() // ✅ Using serverTimestamp
                    };
                }

                // Remove empty fields
                Object.keys(updatedData).forEach(key => {
                    if (updatedData[key] === '' && key !== 'updatedAt') {
                        delete updatedData[key];
                    }
                });

                const profileRef = doc(db, 'profiles', profileId);
                await updateDoc(profileRef, updatedData);

                console.log('✅ Profile updated successfully');

                showMessage('✅ Profile updated successfully!', 'success');
                
                saveBtn.innerHTML = `
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    Saved!
                `;

                setTimeout(() => {
                    window.location.href = '/my-profiles.html';
                }, 1500);

            } catch (error) {
                console.error('❌ Error updating profile:', error);
                
                showMessage('❌ Error: ' + error.message, 'error');

                saveBtn.disabled = false;
                saveBtn.innerHTML = `
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                    </svg>
                    Save Changes
                `;
            }
        });

        // Auto-uppercase vehicle number
        document.addEventListener('DOMContentLoaded', () => {
            const vehicleInput = document.getElementById('vehicleNumber');
            if (vehicleInput) {
                vehicleInput.addEventListener('input', (e) => {
                    e.target.value = e.target.value.toUpperCase();
                });
            }
        });
    </script>
</body>
</html>
